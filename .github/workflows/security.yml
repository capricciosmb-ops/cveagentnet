name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "23 9 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - python
          - javascript-typescript
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v4

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install pip-audit
      # PYSEC-2025-183 has no fixed PyJWT release as of 2026-05-20; the app
      # mitigates the disputed weak-key concern by requiring long JWT secrets in production.
      - run: python -m pip_audit -r requirements.txt --ignore-vuln PYSEC-2025-183
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm audit

  trivy:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

  trivy-images:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            dockerfile: Dockerfile.api
            tag: cveagentnet-api:scan
          - name: frontend
            dockerfile: Dockerfile.frontend
            tag: cveagentnet-frontend:scan
    steps:
      - uses: actions/checkout@v6
      - name: Build ${{ matrix.name }} image
        run: docker build -f ${{ matrix.dockerfile }} -t ${{ matrix.tag }} .
      - uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: image
          image-ref: ${{ matrix.tag }}
          format: sarif
          output: trivy-image-${{ matrix.name }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-image-${{ matrix.name }}.sarif
          category: trivy-image-${{ matrix.name }}

  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
      - uses: actions/upload-artifact@v7
        with:
          name: sbom-spdx
          path: sbom.spdx.json
