name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  api:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python -m pip install pip-audit
      # PYSEC-2025-183 has no fixed PyJWT release as of 2026-05-20; the app
      # mitigates the disputed weak-key concern by requiring long JWT secrets in production.
      - run: python -m pip_audit -r requirements.txt --ignore-vuln PYSEC-2025-183
      - run: PYTHONPATH=. pytest -q

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm audit
      - working-directory: frontend
        run: npm run lint
      - working-directory: frontend
        run: npm run build

  compose:
    name: Docker Compose Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker compose config --quiet
      - run: docker compose --env-file .env.production.example -f docker-compose.prod.yml config --quiet
